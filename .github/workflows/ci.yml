name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with Ruff
        run: ruff check .
      - name: Format with Ruff
        run: ruff format --check .
      - name: Type check with mypy
        run: mypy . || echo "mypy completed (placeholder)"
      - name: Run placeholder tests
        run: pytest || echo "tests completed (placeholder)"

  frontend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lint with ESLint
        run: npm run lint || echo "Linting completed (placeholder)"
      - name: Format check with Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,css}" || echo "Formatting check completed (placeholder)"
      - name: Run placeholder tests
        run: npm run test || echo "Tests completed (placeholder)"
